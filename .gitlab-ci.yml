stages:
  - check
  - publish
  - mirror

check:
  stage: check
  before_script:
    # Clear stale containers + network from prior failed runs. testcontainers
    # cleans up on Drop, but a killed process can leave behind named containers
    # (postgres / hivemq / device-api are network-pinned for device-api beta cfg).
    # Use `docker ps -a` not the default `docker ps` — failed testcontainer
    # runs leave the container in `Created` state (not Running), which still
    # reserves the port mapping. `Created` containers don't show up without -a.
    - docker rm -f postgres emqx hivemq device-api 2>/dev/null || true
    - docker ps -aq --filter "ancestor=hivemq/hivemq-ce" | xargs -r docker rm -f
    - docker ps -aq --filter "ancestor=emqx/emqx" | xargs -r docker rm -f
    # Mock containers ride on auto-generated docker names (silly_lamarr etc.)
    # so we sweep them by image. Without this, a canceled pipeline leaves
    # mock-* containers holding ports 502/161/8443/20000/47808 and the next
    # run's testcontainers wait forever for the listening log.
    - >-
      for img in mock-modbus-server mock-snmp-agent mock-redfish-service
      mock-dnp3-outstation mock-bacnet-device ems-device-api; do
        docker ps -aq --filter "ancestor=public.ecr.aws/y1d2j6a8/$img" | xargs -r docker rm -f
      done
    - docker network rm gateway-e2e 2>/dev/null || true
    # Pre-pull all e2e images so testcontainers' startup-timeout window only
    # has to cover binary startup, not network image fetch. Saves up to a
    # minute per image on a cold runner; turns "container startup timeout"
    # flakes into instant errors.
    - docker pull public.ecr.aws/y1d2j6a8/mock-modbus-server:latest &
      docker pull public.ecr.aws/y1d2j6a8/mock-snmp-agent:latest &
      docker pull public.ecr.aws/y1d2j6a8/mock-redfish-service:latest &
      docker pull public.ecr.aws/y1d2j6a8/mock-dnp3-outstation:latest &
      docker pull public.ecr.aws/y1d2j6a8/mock-bacnet-device:latest &
      docker pull public.ecr.aws/y1d2j6a8/ems-device-api:latest &
      docker pull postgres:15 &
      docker pull hivemq/hivemq-ce:latest &
      wait
  script:
    - cargo cmd checks
    - cargo nextest run --lib --no-default-features --profile ci --cargo-profile dev --target x86_64-unknown-linux-gnu
    - cargo tarpaulin --skip-clean --lib --no-default-features --exclude-files=src/main.rs --target-dir=target/coverage --out Xml
    - cargo cmd integration
  coverage: '/^\d+.\d+% coverage/'
  artifacts:
    when: always
    reports:
      junit: target/nextest/ci/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: cobertura.xml

build:
  stage: publish
  script:
    - aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws
    - docker build -t public.ecr.aws/y1d2j6a8/ems-industrial-gateway .
    - docker push public.ecr.aws/y1d2j6a8/ems-industrial-gateway
  only:
    - main

mirror:
  stage: mirror
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  script:
    - git checkout -B main
    - git push --mirror git@github.com:arcnode-io/ems-industrial-gateway.git
  only:
    - main
